<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Popover Widget</title>
</head>
<body>
  <div class="page-wrapper">
    <h1 class="page-title">Popover Widget</h1>
    <p class="page-subtitle">Реализация Bootstrap Popover на чистом JS</p>

    <div class="demo-area">
      <button
        class="popover-trigger"
        data-popover-title="Popover title"
        data-popover-content="And here's some amazing content. It's very engaging. Right?"
      >
        Click to toggle popover
      </button>
    </div>
  </div>
</body>
</html>
